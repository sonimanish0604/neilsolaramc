services:
  postgres:
    image: postgres:16
    container_name: neilsolar-postgres-local
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-neilsolar_local}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-neilsolar_local}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - neilsolar_pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neilsolar-api-local
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/neilsolar_local}
      DATABASE_ADMIN_URL: ${DATABASE_ADMIN_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/neilsolar_local}
      BOOTSTRAP_ADMIN_KEY: ${BOOTSTRAP_ADMIN_KEY:-dev-bootstrap-key}
      AUTH_DISABLED: ${AUTH_DISABLED:-true}
      APP_ENV: ${APP_ENV:-local}
      APPROVAL_BASE_URL: ${APPROVAL_BASE_URL:-http://localhost:8080/approve}
      APPROVAL_TOKEN_TTL_HOURS: ${APPROVAL_TOKEN_TTL_HOURS:-72}
      PDF_BRAND_LABEL: ${PDF_BRAND_LABEL:-NEIL Solar AMC}
      REPORT_STORAGE_BACKEND: ${REPORT_STORAGE_BACKEND:-AUTO}
      LOCAL_REPORTS_DIR: ${LOCAL_REPORTS_DIR:-/tmp/neilsolar-reports}
      GCS_REPORTS_BUCKET: ${GCS_REPORTS_BUCKET:-}
      SECRET_PROVIDER: ${SECRET_PROVIDER:-ENV}
      SECRET_FAIL_OPEN: ${SECRET_FAIL_OPEN:-true}
      SECRET_CACHE_TTL_SECONDS: ${SECRET_CACHE_TTL_SECONDS:-300}
      SECRET_FETCH_TIMEOUT_SECONDS: ${SECRET_FETCH_TIMEOUT_SECONDS:-10}
      VAULT_ADDR: ${VAULT_ADDR:-}
      VAULT_TOKEN: ${VAULT_TOKEN:-}
      VAULT_MOUNT: ${VAULT_MOUNT:-secret}
      VAULT_KV_VERSION: ${VAULT_KV_VERSION:-2}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      NOTIFICATION_EMAIL_FROM: ${NOTIFICATION_EMAIL_FROM:-}
      NOTIFICATION_MAILGUN_DOMAIN: ${NOTIFICATION_MAILGUN_DOMAIN:-}
      NOTIFICATION_MAILGUN_API_KEY: ${NOTIFICATION_MAILGUN_API_KEY:-}
      NOTIFICATION_MAILGUN_API_KEY_SECRET: ${NOTIFICATION_MAILGUN_API_KEY_SECRET:-}
      NOTIFICATION_MAILGUN_EU_REGION: ${NOTIFICATION_MAILGUN_EU_REGION:-false}
      NOTIFICATION_MAILGUN_TIMEOUT_SECONDS: ${NOTIFICATION_MAILGUN_TIMEOUT_SECONDS:-10}
      NOTIFICATION_TWILIO_SENDGRID_API_KEY_SECRET: ${NOTIFICATION_TWILIO_SENDGRID_API_KEY_SECRET:-}
      TWILIO_AUTH_TOKEN_SECRET: ${TWILIO_AUTH_TOKEN_SECRET:-}
      NOTIFICATION_EMAIL_SMTP_PASSWORD_SECRET: ${NOTIFICATION_EMAIL_SMTP_PASSWORD_SECRET:-}
    ports:
      - "${API_PORT:-8080}:8080"
    command: >
      bash -lc "cd /app &&
      PYTHONPATH=/app alembic upgrade head &&
      PYTHONPATH=/app uvicorn app.main:app --host 0.0.0.0 --port 8080"

  notification-orchestrator:
    build:
      context: ./backend
      dockerfile: Dockerfile.notification-engine
    container_name: neilsolar-notification-orchestrator-local
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/neilsolar_local}
      DATABASE_ADMIN_URL: ${DATABASE_ADMIN_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/neilsolar_local}
      APP_ENV: ${APP_ENV:-local}
      NOTIFICATION_ENGINE_ROLE: ORCHESTRATOR
      NOTIFICATION_ENGINE_RUN_ONCE: ${NOTIFICATION_ENGINE_RUN_ONCE:-false}
      NOTIFICATION_POLL_INTERVAL_SECONDS: ${NOTIFICATION_POLL_INTERVAL_SECONDS:-5}
      NOTIFICATION_BATCH_SIZE: ${NOTIFICATION_BATCH_SIZE:-20}
      NOTIFICATION_RETRY_MAX_ATTEMPTS: ${NOTIFICATION_RETRY_MAX_ATTEMPTS:-3}
      NOTIFICATION_RETRY_DELAY_SECONDS: ${NOTIFICATION_RETRY_DELAY_SECONDS:-60}
    command: >
      bash -lc "cd /app &&
      PYTHONPATH=/app python -m app.notification_engine.run_service"

  notification-worker-email:
    build:
      context: ./backend
      dockerfile: Dockerfile.notification-engine
    container_name: neilsolar-notification-worker-email-local
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/neilsolar_local}
      DATABASE_ADMIN_URL: ${DATABASE_ADMIN_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/neilsolar_local}
      APP_ENV: ${APP_ENV:-local}
      NOTIFICATION_ENGINE_ROLE: WORKER_EMAIL
      NOTIFICATION_ENGINE_RUN_ONCE: ${NOTIFICATION_ENGINE_RUN_ONCE:-false}
      NOTIF_WORKER_CHANNEL: EMAIL
      NOTIFICATION_POLL_INTERVAL_SECONDS: ${NOTIFICATION_POLL_INTERVAL_SECONDS:-5}
      NOTIFICATION_BATCH_SIZE: ${NOTIFICATION_BATCH_SIZE:-20}
      NOTIFICATION_RETRY_MAX_ATTEMPTS: ${NOTIFICATION_RETRY_MAX_ATTEMPTS:-3}
      NOTIFICATION_RETRY_DELAY_SECONDS: ${NOTIFICATION_RETRY_DELAY_SECONDS:-60}
      NOTIFICATION_EMAIL_ENABLED: ${NOTIFICATION_EMAIL_ENABLED:-false}
      NOTIFICATION_EMAIL_PRIMARY_PROVIDER: ${NOTIFICATION_EMAIL_PRIMARY_PROVIDER:-MAILGUN}
      NOTIFICATION_EMAIL_SECONDARY_PROVIDER: ${NOTIFICATION_EMAIL_SECONDARY_PROVIDER:-TWILIO}
      NOTIFICATION_EMAIL_SECONDARY_FAILOVER_ENABLED: ${NOTIFICATION_EMAIL_SECONDARY_FAILOVER_ENABLED:-false}
      NOTIFICATION_EMAIL_FROM: ${NOTIFICATION_EMAIL_FROM:-}
      NOTIFICATION_EMAIL_SMTP_HOST: ${NOTIFICATION_EMAIL_SMTP_HOST:-smtp.gmail.com}
      NOTIFICATION_EMAIL_SMTP_PORT: ${NOTIFICATION_EMAIL_SMTP_PORT:-587}
      NOTIFICATION_EMAIL_SMTP_USER: ${NOTIFICATION_EMAIL_SMTP_USER:-}
      NOTIFICATION_EMAIL_SMTP_PASSWORD: ${NOTIFICATION_EMAIL_SMTP_PASSWORD:-}
      NOTIFICATION_EMAIL_SMTP_SSL: ${NOTIFICATION_EMAIL_SMTP_SSL:-false}
      NOTIFICATION_EMAIL_SMTP_STARTTLS: ${NOTIFICATION_EMAIL_SMTP_STARTTLS:-true}
      NOTIFICATION_EMAIL_SMTP_PASSWORD_SECRET: ${NOTIFICATION_EMAIL_SMTP_PASSWORD_SECRET:-}
      NOTIFICATION_MAILGUN_ENABLED: ${NOTIFICATION_MAILGUN_ENABLED:-false}
      NOTIFICATION_MAILGUN_DOMAIN: ${NOTIFICATION_MAILGUN_DOMAIN:-}
      NOTIFICATION_MAILGUN_API_KEY: ${NOTIFICATION_MAILGUN_API_KEY:-}
      NOTIFICATION_MAILGUN_API_KEY_SECRET: ${NOTIFICATION_MAILGUN_API_KEY_SECRET:-}
      NOTIFICATION_MAILGUN_EU_REGION: ${NOTIFICATION_MAILGUN_EU_REGION:-false}
      NOTIFICATION_MAILGUN_TIMEOUT_SECONDS: ${NOTIFICATION_MAILGUN_TIMEOUT_SECONDS:-10}
      NOTIFICATION_TWILIO_EMAIL_ENABLED: ${NOTIFICATION_TWILIO_EMAIL_ENABLED:-false}
      NOTIFICATION_TWILIO_SENDGRID_API_KEY: ${NOTIFICATION_TWILIO_SENDGRID_API_KEY:-}
      NOTIFICATION_TWILIO_SENDGRID_API_KEY_SECRET: ${NOTIFICATION_TWILIO_SENDGRID_API_KEY_SECRET:-}
      NOTIFICATION_TWILIO_SENDGRID_TIMEOUT_SECONDS: ${NOTIFICATION_TWILIO_SENDGRID_TIMEOUT_SECONDS:-10}
      SECRET_PROVIDER: ${SECRET_PROVIDER:-ENV}
      SECRET_FAIL_OPEN: ${SECRET_FAIL_OPEN:-true}
      SECRET_CACHE_TTL_SECONDS: ${SECRET_CACHE_TTL_SECONDS:-300}
      SECRET_FETCH_TIMEOUT_SECONDS: ${SECRET_FETCH_TIMEOUT_SECONDS:-10}
      VAULT_ADDR: ${VAULT_ADDR:-}
      VAULT_TOKEN: ${VAULT_TOKEN:-}
      VAULT_MOUNT: ${VAULT_MOUNT:-secret}
      VAULT_KV_VERSION: ${VAULT_KV_VERSION:-2}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
    command: >
      bash -lc "cd /app &&
      PYTHONPATH=/app python -m app.notification_engine.run_service"

  notification-worker-whatsapp:
    build:
      context: ./backend
      dockerfile: Dockerfile.notification-engine
    container_name: neilsolar-notification-worker-whatsapp-local
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/neilsolar_local}
      DATABASE_ADMIN_URL: ${DATABASE_ADMIN_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/neilsolar_local}
      APP_ENV: ${APP_ENV:-local}
      NOTIFICATION_ENGINE_ROLE: WORKER_WHATSAPP
      NOTIFICATION_ENGINE_RUN_ONCE: ${NOTIFICATION_ENGINE_RUN_ONCE:-false}
      NOTIF_WORKER_CHANNEL: WHATSAPP
      NOTIFICATION_POLL_INTERVAL_SECONDS: ${NOTIFICATION_POLL_INTERVAL_SECONDS:-5}
      NOTIFICATION_BATCH_SIZE: ${NOTIFICATION_BATCH_SIZE:-20}
      NOTIFICATION_RETRY_MAX_ATTEMPTS: ${NOTIFICATION_RETRY_MAX_ATTEMPTS:-3}
      NOTIFICATION_RETRY_DELAY_SECONDS: ${NOTIFICATION_RETRY_DELAY_SECONDS:-60}
      TWILIO_ENABLED: ${TWILIO_ENABLED:-false}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_AUTH_TOKEN_SECRET: ${TWILIO_AUTH_TOKEN_SECRET:-}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-whatsapp:+14155238886}
      TWILIO_REQUEST_TIMEOUT_SECONDS: ${TWILIO_REQUEST_TIMEOUT_SECONDS:-10}
      SECRET_PROVIDER: ${SECRET_PROVIDER:-ENV}
      SECRET_FAIL_OPEN: ${SECRET_FAIL_OPEN:-true}
      SECRET_CACHE_TTL_SECONDS: ${SECRET_CACHE_TTL_SECONDS:-300}
      SECRET_FETCH_TIMEOUT_SECONDS: ${SECRET_FETCH_TIMEOUT_SECONDS:-10}
      VAULT_ADDR: ${VAULT_ADDR:-}
      VAULT_TOKEN: ${VAULT_TOKEN:-}
      VAULT_MOUNT: ${VAULT_MOUNT:-secret}
      VAULT_KV_VERSION: ${VAULT_KV_VERSION:-2}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
    command: >
      bash -lc "cd /app &&
      PYTHONPATH=/app python -m app.notification_engine.run_service"

  notification-worker-sms:
    build:
      context: ./backend
      dockerfile: Dockerfile.notification-engine
    container_name: neilsolar-notification-worker-sms-local
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/neilsolar_local}
      DATABASE_ADMIN_URL: ${DATABASE_ADMIN_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/neilsolar_local}
      APP_ENV: ${APP_ENV:-local}
      NOTIFICATION_ENGINE_ROLE: WORKER_SMS
      NOTIFICATION_ENGINE_RUN_ONCE: ${NOTIFICATION_ENGINE_RUN_ONCE:-false}
      NOTIF_WORKER_CHANNEL: SMS
      NOTIFICATION_POLL_INTERVAL_SECONDS: ${NOTIFICATION_POLL_INTERVAL_SECONDS:-5}
      NOTIFICATION_BATCH_SIZE: ${NOTIFICATION_BATCH_SIZE:-20}
      NOTIFICATION_RETRY_MAX_ATTEMPTS: ${NOTIFICATION_RETRY_MAX_ATTEMPTS:-3}
      NOTIFICATION_RETRY_DELAY_SECONDS: ${NOTIFICATION_RETRY_DELAY_SECONDS:-60}
    command: >
      bash -lc "cd /app &&
      PYTHONPATH=/app python -m app.notification_engine.run_service"

  notification-maintenance-archive:
    build:
      context: ./backend
      dockerfile: Dockerfile.notification-engine
    container_name: neilsolar-notification-maintenance-archive-local
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/neilsolar_local}
      DATABASE_ADMIN_URL: ${DATABASE_ADMIN_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/neilsolar_local}
      APP_ENV: ${APP_ENV:-local}
      NOTIFICATION_MAINTENANCE_RUN_ONCE: ${NOTIFICATION_MAINTENANCE_RUN_ONCE:-false}
      NOTIFICATION_ARCHIVE_INTERVAL_SECONDS: ${NOTIFICATION_ARCHIVE_INTERVAL_SECONDS:-3600}
      NOTIFICATION_RETRY_MAX_ATTEMPTS: ${NOTIFICATION_RETRY_MAX_ATTEMPTS:-3}
      NOTIFICATION_RETENTION_ACTIVE_DAYS_DEFAULT: ${NOTIFICATION_RETENTION_ACTIVE_DAYS_DEFAULT:-7}
      NOTIFICATION_RETENTION_HISTORY_DAYS_DEFAULT: ${NOTIFICATION_RETENTION_HISTORY_DAYS_DEFAULT:-365}
      NOTIFICATION_RETENTION_DEAD_LETTER_DAYS_DEFAULT: ${NOTIFICATION_RETENTION_DEAD_LETTER_DAYS_DEFAULT:-365}
      NOTIFICATION_PURGE_AFTER_DEACTIVATION_DAYS_DEFAULT: ${NOTIFICATION_PURGE_AFTER_DEACTIVATION_DAYS_DEFAULT:-90}
    command: >
      bash -lc "cd /app &&
      PYTHONPATH=/app python -m app.notification_engine.run_archive_maintenance"
    profiles:
      - maintenance

  notification-maintenance-purge:
    build:
      context: ./backend
      dockerfile: Dockerfile.notification-engine
    container_name: neilsolar-notification-maintenance-purge-local
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/neilsolar_local}
      DATABASE_ADMIN_URL: ${DATABASE_ADMIN_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/neilsolar_local}
      APP_ENV: ${APP_ENV:-local}
      NOTIFICATION_MAINTENANCE_RUN_ONCE: ${NOTIFICATION_MAINTENANCE_RUN_ONCE:-false}
      NOTIFICATION_PURGE_INTERVAL_SECONDS: ${NOTIFICATION_PURGE_INTERVAL_SECONDS:-86400}
      NOTIFICATION_RETENTION_HISTORY_DAYS_DEFAULT: ${NOTIFICATION_RETENTION_HISTORY_DAYS_DEFAULT:-365}
      NOTIFICATION_RETENTION_DEAD_LETTER_DAYS_DEFAULT: ${NOTIFICATION_RETENTION_DEAD_LETTER_DAYS_DEFAULT:-365}
      NOTIFICATION_PURGE_AFTER_DEACTIVATION_DAYS_DEFAULT: ${NOTIFICATION_PURGE_AFTER_DEACTIVATION_DAYS_DEFAULT:-90}
    command: >
      bash -lc "cd /app &&
      PYTHONPATH=/app python -m app.notification_engine.run_purge_maintenance"
    profiles:
      - maintenance

  adminer:
    image: adminer:4
    container_name: neilsolar-adminer-local
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    profiles:
      - adminer

volumes:
  neilsolar_pgdata:
