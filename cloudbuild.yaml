steps:
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'classify-change-set'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        bash scripts/cloudbuild/classify_changes.sh

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-image'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        bash scripts/cloudbuild/skip_if_docs_only.sh build-image
        docker build \
          -t "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${SHORT_SHA}" \
          -f backend/Dockerfile \
          backend

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-image'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        bash scripts/cloudbuild/skip_if_docs_only.sh push-image
        docker push "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${SHORT_SHA}"

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'run-db-migrations'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        bash scripts/cloudbuild/skip_if_docs_only.sh run-db-migrations
        IMAGE="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${SHORT_SHA}"
        gcloud run jobs deploy ${_MIGRATION_JOB} \
          --image="$${IMAGE}" \
          --region=${_REGION} \
          --project=${PROJECT_ID} \
          --service-account=${_RUNTIME_SA} \
          --set-cloudsql-instances=${_CLOUDSQL_INSTANCE} \
          --set-env-vars=PYTHONPATH=/app \
          --set-secrets=DATABASE_ADMIN_URL=${_DB_ADMIN_SECRET}:latest,DATABASE_URL=${_DB_ADMIN_SECRET}:latest \
          --command=python \
          --args=-m,alembic,-c,/app/alembic.ini,upgrade,head \
          --task-timeout=600s \
          --max-retries=0 \
          --quiet

        gcloud run jobs execute ${_MIGRATION_JOB} \
          --region=${_REGION} \
          --project=${PROJECT_ID} \
          --wait \
          --quiet

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-cloud-run'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        bash scripts/cloudbuild/skip_if_docs_only.sh deploy-cloud-run
        gcloud run deploy ${_SERVICE} \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${SHORT_SHA} \
          --region=${_REGION} \
          --platform=managed \
          --service-account=${_RUNTIME_SA} \
          --add-cloudsql-instances=${_CLOUDSQL_INSTANCE} \
          --set-secrets=DATABASE_URL=${_DB_URL_SECRET}:latest,DATABASE_ADMIN_URL=${_DB_ADMIN_SECRET}:latest \
          --project=${PROJECT_ID} \
          --quiet

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'smoke-check-health'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        bash scripts/cloudbuild/skip_if_docs_only.sh smoke-check-health
        SERVICE_URL="$(gcloud run services describe ${_SERVICE} \
          --region=${_REGION} \
          --project=${PROJECT_ID} \
          --format='value(status.url)')"
        HEALTH_URL="$${SERVICE_URL}/health"

        echo "Smoke check: $${HEALTH_URL}"
        HTTP_CODE="$(curl -sS -o /tmp/health.out -w '%{http_code}' "$${HEALTH_URL}" || true)"
        if [ "$${HTTP_CODE}" = "200" ]; then
          cat /tmp/health.out
          exit 0
        fi

        if [ "$${HTTP_CODE}" = "401" ] || [ "$${HTTP_CODE}" = "403" ]; then
          echo "Health endpoint is protected (HTTP $${HTTP_CODE}); treating as successful smoke check for private service."
          exit 0
        fi

        echo "Health check failed. HTTP=$${HTTP_CODE}"
        echo "Response:"
        cat /tmp/health.out || true
        exit 1

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'post-deploy-api-tests'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        bash scripts/cloudbuild/skip_if_docs_only.sh post-deploy-api-tests
        SERVICE_URL="$(gcloud run services describe ${_SERVICE} \
          --region=${_REGION} \
          --project=${PROJECT_ID} \
          --format='value(status.url)')"
        REPORT_BRANCH="$${BRANCH_NAME:-manual}"
        export SERVICE_URL REPORT_BRANCH REPORT_DIR=/workspace/reports
        export BUILD_ID="${BUILD_ID}"
        export POST_DEPLOY_ADMIN_KEY="${_POST_DEPLOY_ADMIN_KEY}"
        export RUN_STATEFUL_POST_DEPLOY_TESTS="${_RUN_STATEFUL_POST_DEPLOY_TESTS}"
        export RUN_PHASE1C_POST_DEPLOY_TESTS="${_RUN_PHASE1C_POST_DEPLOY_TESTS}"
        export FUNCTIONAL_BEARER_TOKEN="${_FUNCTIONAL_BEARER_TOKEN}"
        bash scripts/post_deploy_cloud_tests.sh

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'upload-post-deploy-reports'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        bash scripts/cloudbuild/skip_if_docs_only.sh upload-post-deploy-reports
        REPORT_BRANCH="$${BRANCH_NAME:-manual}"
        DEST="gs://${_REPORTS_BUCKET}/$${REPORT_BRANCH}/${_SERVICE}/${BUILD_ID}"
        gsutil -m cp /workspace/reports/post_deploy_summary.md "$${DEST}/"
        gsutil -m cp /workspace/reports/post_deploy_junit.xml "$${DEST}/"
        gsutil -m cp /workspace/reports/post_deploy_exit_code.txt "$${DEST}/"
        if [ -f /workspace/reports/phase1c_post_deploy_summary.md ]; then
          gsutil -m cp /workspace/reports/phase1c_post_deploy_summary.md "$${DEST}/"
          gsutil -m cp /workspace/reports/phase1c_post_deploy_junit.xml "$${DEST}/"
          gsutil -m cp /workspace/reports/phase1c_post_deploy_exit_code.txt "$${DEST}/"
        fi
        echo "Post-deploy reports uploaded:"
        echo "$${DEST}/post_deploy_summary.md"
        echo "$${DEST}/post_deploy_junit.xml"

  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'enforce-post-deploy-tests'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        bash scripts/cloudbuild/skip_if_docs_only.sh enforce-post-deploy-tests
        EXIT_CODE="$$(cat /workspace/reports/post_deploy_exit_code.txt)"
        if [ "$${EXIT_CODE}" != "0" ]; then
          echo "Post-deploy API tests reported failures."
          exit 1
        fi
        echo "Post-deploy API tests passed."

  - name: 'python:3.11-slim'
    id: 'run-lint-and-tests'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -euo pipefail
        bash scripts/cloudbuild/skip_if_docs_only.sh run-lint-and-tests
        cd backend
        export PYTHONPATH="$$(pwd)"
        python -m pip install --upgrade pip
        python -m pip install poetry
        poetry config virtualenvs.create false
        poetry install --no-root --only main
        python -m pip install ruff pytest
        echo 'Running linter (ruff)'
        ruff check .
        if [ -d tests ] || [ -f pytest.ini ]; then
          echo 'Running tests'
          pytest -q
        else
          echo 'No tests found; skipping'
        fi

substitutions:
  _REGION: 'asia-south1'
  _AR_REPO: 'neilsolar-containers'
  _IMAGE_NAME: 'allsolar-api'
  _SERVICE: 'neilsolar-dev-api'
  _RUNTIME_SA: '174945359533-compute@developer.gserviceaccount.com'
  _MIGRATION_JOB: 'neilsolar-dev-db-migrate'
  _CLOUDSQL_INSTANCE: 'solar-amc-app-xkoe90:asia-south1:neilsolar-amc'
  _DB_URL_SECRET: 'DATABASE_URL'
  _DB_ADMIN_SECRET: 'DATABASE_ADMIN_URL'
  _REPORTS_BUCKET: 'neilsolar-ci-reports'
  _POST_DEPLOY_ADMIN_KEY: 'dev-bootstrap-key'
  _RUN_STATEFUL_POST_DEPLOY_TESTS: 'true'
  _RUN_PHASE1C_POST_DEPLOY_TESTS: 'true'
  _FUNCTIONAL_BEARER_TOKEN: ''
  _DOCS_ONLY_OVERRIDE: 'auto'
  _FORCE_FULL_PIPELINE: 'false'
options:
  logging: CLOUD_LOGGING_ONLY
